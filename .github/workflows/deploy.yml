name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync site files
        run: |
          sudo rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "README.md" \
            "$GITHUB_WORKSPACE/" /var/www/html/

      - name: Reload Nginx
        run: sudo systemctl reload nginx
